# ══════════════════════════════════════════════════════════════
#  Virtual drone stream — MediaMTX + ffmpeg publisher
# ══════════════════════════════════════════════════════════════
#
#  Start:
#      docker compose -f docker/compose.yaml up -d
#
#  Then point the inference engine at the stream:
#      rtsp://localhost:8554/drone01
#
#  Stop:
#      docker compose -f docker/compose.yaml down
#

name: gpmodel-vstream

services:
  # ── RTSP server ──
  mediamtx:
    image: bluenviron/mediamtx:1.9.3
    container_name: gpmodel-mediamtx
    ports:
      - "8554:8554"   # RTSP
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped

  # ── Publisher: loops a local clip and pushes it into mediamtx ──
  publisher:
    image: linuxserver/ffmpeg:latest
    container_name: gpmodel-publisher
    depends_on:
      - mediamtx
    volumes:
      - ../assets/samples:/samples:ro
    entrypoint:
      - ffmpeg
      - -re
      - -stream_loop
      - "-1"
      - -i
      - /samples/drone_01.mp4
      - -c:v
      - copy
      - -an
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/drone01
    restart: unless-stopped
