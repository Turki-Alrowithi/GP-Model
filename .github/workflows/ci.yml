name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: lint · types · tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src tests apps

      - name: Ruff format check
        run: uv run ruff format --check src tests apps

      - name: Mypy (strict)
        run: uv run mypy src/gpmodel

      - name: Pytest
        run: uv run pytest --no-cov -q

  # Separate, optional job that only runs on push to main to catch
  # regressions in packaging — keeps PR runs fast.
  build:
    name: packaging smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: gpmodel-dist
          path: dist/
          retention-days: 14
