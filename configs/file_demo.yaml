# ═══════════════════════════════════════════════════════════
#  GP-Model — File playback profile (deterministic demo)
# ═══════════════════════════════════════════════════════════
#
#  Plays the bundled sample clip on a loop. Useful for headless
#  smoke tests and regression runs.
#
#  Run with:
#      uv run gpmodel --config configs/file_demo.yaml
#

stream:
  id: "file-demo"
  source:
    type: file
    path: assets/samples/drone_01.mp4
    loop: true

detector:
  type: yolo
  weights: yolo11n.pt       # nano — fast for demo runs
  device: mps
  imgsz: 640
  conf: 0.30
  iou: 0.45
  classes: null
  half: false

tracker:
  enabled: true
  type: bytetrack
  fps: 24.0
  minimum_consecutive_frames: 1

rules:
  geofence:
    enabled: true
    classes: [person]
    severity: HIGH
    cooldown_s: 30
    foot_point: true
    zones:
      # Demo zone: right-half of the frame. Any person whose feet fall
      # inside this polygon fires a HIGH alert once per 30 s per track.
      - name: restricted-east
        normalized: true
        points:
          - [0.5, 0.0]
          - [1.0, 0.0]
          - [1.0, 1.0]
          - [0.5, 1.0]
  crowd:
    enabled: true
    threshold: 3         # 3+ persons trigger a crowd alert
    classes: [person]
    severity: MEDIUM
    min_duration_s: 2.0  # must persist for 2s before firing
    cooldown_s: 60

publishers:
  console:
    enabled: true
    print_detections: true
  jsonl:
    enabled: false
    path: logs/events.jsonl
    include_detection_frames: false
  metrics:
    enabled: true

perf:
  window: 60
  emit_every: 30

logging:
  level: INFO
  format: console
